<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Trading Assistant — Mia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F2044;
    --navy-light: #1a3368;
    --green: #00C853;
    --red: #F5222D;
    --bg: #F5F6FA;
    --card: #FFFFFF;
    --border: #E8ECF1;
    --text: #1A1A2E;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --accent: #00C853;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #E8ECF1;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }

  .app-container {
    width: 100%; max-width: 1280px; height: 92vh; min-height: 700px;
    background: var(--bg);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    box-shadow: var(--shadow-lg);
  }

  /* ─── LEFT — Portfolio Panel ─── */
  .portfolio-panel {
    width: 35%; min-width: 380px;
    background: var(--card);
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .portfolio-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: #fff; padding: 24px 22px 20px;
  }
  .portfolio-header .label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
  .portfolio-header .value { font-size: 28px; font-weight: 700; margin: 2px 0 4px; }
  .portfolio-header .pnl { font-size: 15px; font-weight: 600; }
  .pnl-positive { color: var(--green); }
  .pnl-negative { color: var(--red); }

  .holdings-section { padding: 16px 22px; }
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before { content: ''; width: 3px; height: 16px; background: var(--navy); border-radius: 2px; }

  .holdings-table { width: 100%; font-size: 12px; }
  .holdings-table th {
    text-align: left; font-weight: 500; color: var(--text-muted);
    font-size: 11px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .holdings-table td { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .holdings-table .ticker { font-weight: 700; font-size: 13px; }
  .holdings-table .name { font-size: 11px; color: var(--text-secondary); }
  .holdings-table .pnl-col { font-weight: 600; text-align: right; }
  .holdings-table th:last-child, .holdings-table td:last-child { text-align: right; }

  .market-summary {
    padding: 14px 22px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .market-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px;
  }
  .market-row .idx { color: var(--text-secondary); }
  .market-row .val { font-weight: 600; }
  .market-row .chg { font-size: 12px; font-weight: 600; min-width: 56px; text-align: right; }

  .account-strip {
    padding: 14px 22px; border-top: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 12px;
  }
  .account-chip {
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 8px 14px; font-size: 11px;
    display: flex; flex-direction: column; gap: 2px;
    flex: 1; min-width: 100px;
  }
  .account-chip .chip-label { color: var(--text-muted); font-size: 10px; }
  .account-chip .chip-value { font-weight: 600; font-size: 12px; }

  /* ─── RIGHT — Chat Interface ─── */
  .chat-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #FAFBFD;
    min-width: 0;
  }

  .chat-header {
    background: var(--card);
    padding: 16px 22px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .chat-header-left { display: flex; align-items: center; gap: 10px; }
  .ai-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--green) 0%, #00A844 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: #fff; position: relative;
  }
  .live-dot {
    position: absolute; bottom: -1px; right: -1px;
    width: 10px; height: 10px; background: var(--green);
    border: 2px solid #fff; border-radius: 50%;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  .chat-header-title { font-size: 16px; font-weight: 700; }
  .chat-header-subtitle { font-size: 11px; color: var(--text-muted); }

  /* Language toggle */
  .lang-toggle {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .lang-toggle:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 22px;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* Suggested chips */
  .chips-container {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 0 22px 14px;
  }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 16px;
    font-size: 13px; color: var(--navy);
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* Chat bubbles */
  .message {
    display: flex; flex-direction: column;
    animation: msgIn 0.3s ease-out;
    max-width: 80%;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }

  .bubble {
    padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.55;
  }
  .message.user .bubble {
    background: var(--navy); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .message.assistant .bubble {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }

  .compliance-badge {
    font-size: 10px; color: var(--text-muted);
    margin-top: 4px; display: flex; align-items: center; gap: 4px;
  }
  .compliance-badge .badge-icon {
    display: inline-block;
    width: 14px; height: 14px;
    background: #F0F0F5; border-radius: 50%;
    text-align: center; line-height: 14px; font-size: 9px;
  }

  .advisor-btn {
    display: inline-block; margin-top: 6px;
    background: var(--bg); border: 1px dashed var(--border);
    border-radius: var(--radius-sm); padding: 6px 14px;
    font-size: 12px; color: var(--navy); cursor: pointer;
    transition: all 0.15s;
  }
  .advisor-btn:hover { background: #E8ECF1; border-style: solid; }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start; display: flex; gap: 5px;
    padding: 14px 18px; background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .typing-indicator .dot {
    width: 7px; height: 7px; background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input bar */
  .input-bar {
    padding: 14px 22px; background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .input-bar input {
    flex: 1; border: 1px solid var(--border); border-radius: 24px;
    padding: 10px 18px; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
    background: var(--bg);
  }
  .input-bar input:focus { border-color: var(--navy); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--navy); color: #fff; border: none;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--navy-light); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .disclaimer-strip {
    padding: 8px 22px;
    font-size: 10px; color: var(--text-muted);
    text-align: center; background: #F9FAFB;
    border-top: 1px solid var(--border);
  }

  /* API key modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15,32,68,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--card); border-radius: var(--radius);
    padding: 28px 24px; width: 400px; max-width: 90vw;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 { font-size: 18px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .modal input {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 14px; font-family: inherit; margin-bottom: 12px;
    outline: none;
  }
  .modal input:focus { border-color: var(--navy); }
  .modal .btn-primary {
    width: 100%; background: var(--navy); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 10px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .modal .btn-primary:hover { background: var(--navy-light); }
  .modal .skip-link {
    text-align: center; margin-top: 10px; font-size: 12px;
    color: var(--text-muted); cursor: pointer; text-decoration: underline;
  }

  .footer {
    padding: 8px 22px; font-size: 10px; color: var(--text-muted);
    text-align: center; background: #F9FAFB;
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }

  /* Responsive */
  @media (max-width: 860px) {
    .app-container { flex-direction: column; height: auto; min-height: 100vh; }
    .portfolio-panel { width: 100%; min-width: 0; max-height: 55vh; }
    .chat-panel { min-height: 400px; }
    .message { max-width: 90%; }
  }
</style>
</head>
<body>

<div class="app-container">

  <!-- LEFT — Portfolio Panel -->
  <div class="portfolio-panel" id="portfolio">
    <div class="portfolio-header">
      <div class="label" data-i18n="portfolio.myPortfolio">My Portfolio</div>
      <div class="value" id="totalValue">--</div>
      <div class="pnl pnl-positive" id="dayPnL">--</div>
    </div>

    <div class="holdings-section">
      <div class="section-title" data-i18n="portfolio.holdings">Holdings</div>
      <table class="holdings-table">
        <thead id="holdingsHead"></thead>
        <tbody id="holdingsBody"></tbody>
      </table>
    </div>

    <div class="market-summary" id="marketSummary"></div>
    <div class="account-strip" id="accountStrip"></div>
  </div>

  <!-- RIGHT — Chat Interface -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="ai-avatar">
          🤖<div class="live-dot"></div>
        </div>
        <div>
          <div class="chat-header-title" data-i18n="chat.headerTitle">Mia — Your AI Trading Assistant</div>
          <div class="chat-header-subtitle" data-i18n="chat.headerSubtitle">对话记录不会保存 · Online now</div>
        </div>
      </div>
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
    </div>

    <div class="chips-container" id="chipsContainer"></div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-bar">
      <input type="text" id="userInput" data-i18n-placeholder="chat.inputPlaceholder" placeholder="输入你的问题..." autocomplete="off">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <div class="disclaimer-strip" data-i18n="chat.disclaimer"></div>

    <div class="footer">
      <div data-i18n="chat.footerLine1">Smart Trading Assistant — Portfolio Demo | AI Product Manager | Hong Kong Brokerage &amp; Fintech</div>
      <div data-i18n="chat.footerLine2">本 demo 使用模拟数据，不代表真实投资组合</div>
    </div>
  </div>
</div>

<!-- API Key Modal -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3 data-i18n="modal.title">🔑 输入 DeepSeek API Key</h3>
    <p data-i18n="modal.desc">API Key 仅暂存于浏览器中，不会上传至任何服务器。你可以从 DeepSeek 开发者平台获取。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-...">
    <button class="btn-primary" id="modalSaveBtn" onclick="saveApiKey()" data-i18n="modal.startBtn">开始使用</button>
    <div class="skip-link" onclick="skipApiKey()" data-i18n="modal.skipLink">跳过，先看 Demo 界面</div>
  </div>
</div>

<script>
// ─── i18n ───
const i18n = {
  zh: {

      accountType: "账户类型",

      tencent: `**腾讯控股 (0700.HK)** 是你组合里面最大的持仓之一，持有500股，平均成本 HK$312.40，现价 HK$358.20，账面盈利约 **+HK$22,900 (+14.66%)**。\n\n腾讯核心业务包括游戏、社交媒体（微信）、金融科技及云服务。最近几季业绩显示游戏业务复苏，广告收入也稳步增长。不过要注意监管环境和宏观经济对科技股的影响。\n\n以上仅为信息整理，不构成投资建议。`,

// ─── Helpers ───
function t(path) {
  const keys = path.split('.');
  let val = i18n[currentLang];
  for (const k of keys) {
    if (val == null) return path;
    val = val[k];
  }
  return val ?? path;
}

function hasCJK(text) {
  return /[一-鿿㐀-䶿]/.test(text);
}

// ─── State ───
let currentLang = localStorage.getItem('lang') || 'zh';
let apiKey = null;
let conversationHistory = [];
let isWaiting = false;

function getSystemPrompt() {
  return i18n[currentLang].systemPrompt;
}

function resetConversation() {
  conversationHistory = [{ role: "system", content: getSystemPrompt() }];
}

// ─── Initialize UI ───
function renderPortfolio() {
  // Header
  document.getElementById('totalValue').textContent = portfolio.totalValue;
  document.getElementById('dayPnL').textContent = `${portfolio.dayPnL} (${portfolio.dayPnLPct})`;

  // Holdings headers
  document.getElementById('holdingsHead').innerHTML = '<tr>' +
    t('portfolio.headers').map(h => `<th>${h}</th>`).join('') +
    '</tr>';

  // Holdings body
  const tbody = document.getElementById('holdingsBody');
  tbody.innerHTML = '';
  portfolio.holdings.forEach(h => {
    const shares = h.shares.toLocaleString();
    const avg = `${h.currency === 'HKD' ? 'HK$' : '$'}${h.avgCost.toFixed(2)}`;
    const last = `${h.currency === 'HKD' ? 'HK$' : '$'}${h.lastPrice.toFixed(2)}`;
    const pnlVal = (h.lastPrice - h.avgCost) * h.shares;
    const pnlStr = pnlVal >= 0 ? `+${(h.currency === 'HKD' ? 'HK$' : '$')}${pnlVal.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}` : `${(h.currency === 'HKD' ? '-HK$' : '-$')}${Math.abs(pnlVal).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
    const pnlPct = (((h.lastPrice - h.avgCost) / h.avgCost) * 100);
    const pnlClass = pnlPct >= 0 ? 'pnl-positive' : 'pnl-negative';
    const pnlPctStr = `${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%`;
    const name = currentLang === 'zh' ? h.nameZh : h.nameEn;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="ticker">${h.ticker}</div><div class="name">${name}</div></td>
      <td>${shares}</td>
      <td>${avg}</td>
      <td>${last}</td>
      <td class="pnl-col ${pnlClass}">${pnlStr}</td>
      <td class="pnl-col ${pnlClass}">${pnlPctStr}</td>
    `;
    tbody.appendChild(tr);
  });

  // Market Summary
  const msDiv = document.getElementById('marketSummary');
  msDiv.innerHTML = '';
  portfolio.marketSummary.forEach(m => {
    const isNeg = m.change.startsWith('-');
    const idxName = currentLang === 'zh' ? m.indexZh : m.indexEn;
    const row = document.createElement('div');
    row.className = 'market-row';
    row.innerHTML = `
      <span class="idx">${idxName}</span>
      <span class="val">${m.value}</span>
      <span class="chg" style="color:${isNeg ? 'var(--red)' : 'var(--green)'}">${m.change}</span>
    `;
    msDiv.appendChild(row);
  });

  // Account Strip
  const accDiv = document.getElementById('accountStrip');
  accDiv.innerHTML = '';
  const accChips = [
    { label: t('portfolio.accountType'), value: t('portfolio.accountTypeVal') },
    { label: t('portfolio.riskLevel'), value: t('portfolio.riskLevelVal') },
    { label: t('portfolio.cashBalance'), value: portfolio.cashBalance || "HKD 284,320" }
  ];
  accChips.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'account-chip';
    chip.innerHTML = `<span class="chip-label">${c.label}</span><span class="chip-value">${c.value}</span>`;
    accDiv.appendChild(chip);
  });
}

function renderChips() {
  const container = document.getElementById('chipsContainer');
  container.innerHTML = '';
  t('chat.chips').forEach(text => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = text;
    chip.addEventListener('click', () => {
      document.getElementById('userInput').value = text;
      sendMessage();
    });
    container.appendChild(chip);
  });
}

function renderWelcomeMessage() {
  const msgs = document.getElementById('chatMessages');
  // Remove any existing welcome message
  const existing = msgs.querySelector('.message.welcome');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = 'message assistant welcome';
  div.innerHTML = `
    <div class="bubble">👋 ${t('chat.welcome')}</div>
    <div class="compliance-badge"><span class="badge-icon">ℹ️</span> ${t('compliance.badge')}</div>
  `;
  msgs.prepend(div);
}

function applyI18n() {
  // HTML lang
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';

  // Lang toggle button
  document.getElementById('langToggle').textContent = currentLang === 'zh' ? 'EN' : '中';

  // data-i18n textContent
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  // data-i18n-placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });

  // Re-render dynamic panels
  renderPortfolio();
  renderChips();
  renderWelcomeMessage();

  // Update modal button
  const saveBtn = document.getElementById('modalSaveBtn');
  if (saveBtn) saveBtn.textContent = t('modal.startBtn');

  // Reset system prompt
  resetConversation();
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', currentLang);
  applyI18n();
}

// ─── Chat Functions ───
function hideChips() {
  const chips = document.getElementById('chipsContainer');
  if (chips) chips.style.display = 'none';
}

function scrollToBottom() {
  const msgs = document.getElementById('chatMessages');
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  hideChips();
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function showTypingIndicator() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function replyLang(userMessage) {
  return hasCJK(userMessage) ? 'zh' : 'en';
}

function detectBoundaryViolation(userMessage) {
  const lower = userMessage.toLowerCase();
  const patterns = [
    // Chinese (Simplified)
    /应不应该买/, /应不应该卖/, /应该买/, /应该卖/,
    /应该入手/, /应该卖出/, /应该抛/,
    /值不值得买/, /值不值得投资/,
    /可不可以买/, /可不可以卖/,
    /能不能买/, /能不能卖/,
    /该不该加仓/, /该不该减仓/,
    // English
    /should i buy/, /should i sell/,
    /buy.*recommend/, /sell.*recommend/,
    /is it a good time/, /what price.*target/,
    /target price/, /price prediction/,
  ];
  return patterns.some(p => p.test(lower));
}

function addAssistantMessage(text, showAdvisorBtn = false, langOverride = null) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message assistant';

  let html = `<div class="bubble">${formatMessage(text)}</div>`;
  html += `<div class="compliance-badge"><span class="badge-icon">ℹ️</span> ${t('compliance.badge')}</div>`;

  if (showAdvisorBtn) {
    html += `<button class="advisor-btn" onclick="alert('${escapeHtml(t('compliance.advisorAlert'))}')">🔍 ${t('compliance.advisorBtn')}</button>`;
  }

  div.innerHTML = html;
  msgs.appendChild(div);
  scrollToBottom();
}

function addErrorMessage() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `<div class="bubble" style="color:var(--red)">⚠️ ${t('compliance.errorMsg')}</div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatMessage(text) {
  let escaped = escapeHtml(text);
  escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  escaped = escaped.replace(/\n- /g, '\n• ');
  escaped = escaped.replace(/\n/g, '<br>');
  return escaped;
}

// ─── API Call ───
async function callDeepSeek(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  try {
    const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        max_tokens: 800,
        messages: conversationHistory
      })
    });

    if (!response.ok) {
      throw new Error(`API error: ${response.status}`);
    }

    const data = await response.json();
    const reply = data.choices[0].message.content;

    const isBoundary = detectBoundaryViolation(userMessage);
    const lang = replyLang(userMessage);
    addAssistantMessage(reply, isBoundary, lang);

    conversationHistory.push({ role: "assistant", content: reply });

    if (conversationHistory.length > 20) {
      const sys = conversationHistory[0];
      conversationHistory = [sys, ...conversationHistory.slice(-19)];
    }
  } catch (err) {
    console.error("API call failed:", err);
    conversationHistory.pop();
    addErrorMessage();
  }
}

// ─── Send Message ───
async function sendMessage() {
  if (isWaiting) return;

  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;

  const localBoundary = detectBoundaryViolation(msg);
  const lang = replyLang(msg);

  input.value = '';
  isWaiting = true;
  document.getElementById('sendBtn').disabled = true;

  addUserMessage(msg);

  if (!apiKey) {
    showTypingIndicator();
    await sleep(1200 + Math.random() * 800);
    removeTypingIndicator();

    const demoReply = localBoundary
      ? i18n[lang].compliance.boundaryRefusal
      : generateDemoReply(msg, lang);

    addAssistantMessage(demoReply, localBoundary, lang);

    conversationHistory.push({ role: "user", content: msg });
    conversationHistory.push({ role: "assistant", content: demoReply });
  } else {
    showTypingIndicator();
    await callDeepSeek(msg);
    removeTypingIndicator();
  }

  isWaiting = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function generateDemoReply(msg, lang) {
  const lower = msg.toLowerCase();
  const R = i18n[lang].demoReplies;

  if (lower.includes('组合') || lower.includes('portfolio') || lower.includes('表现') || lower.includes('performance')) {
    return R.portfolio();
  }

  if (lower.includes('700') || lower.includes('腾讯') || lower.includes('tencent')) {
    return R.tencent;
  }

  if (lower.includes('nvda') || lower.includes('辉达') || lower.includes('nvidia')) {
    return R.nvda;
  }

  if (lower.includes('rsi')) {
    return R.rsi;
  }

  if (lower.includes('风险') || lower.includes('risk') || lower.includes('風險')) {
    return R.risk;
  }

  return R.fallback;
}

// ─── API Key Modal ───
function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const key = input.value.trim();
  apiKey = key || null;
  document.getElementById('apiModal').style.display = 'none';
}

function skipApiKey() {
  apiKey = null;
  document.getElementById('apiModal').style.display = 'none';
}

// Allow pressing Enter in the API key input to submit
document.getElementById('apiKeyInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveApiKey();
});

// ─── Event Listeners ───
document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ─── Boot ───
resetConversation();
renderPortfolio();
renderChips();
renderWelcomeMessage();
applyI18n();

// Set initial lang toggle button text
document.getElementById('langToggle').textContent = currentLang === 'zh' ? 'EN' : '中';
</script>
